<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Το QR δημιουργήθηκε τον Μάιο του 2026</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Georgia', serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      text-align: center;
    }

    .message {
      font-size: clamp(1.6rem, 6vw, 3rem);
      font-weight: bold;
      color: #ffffff;
      line-height: 1.4;
      max-width: 600px;
      text-shadow: 0 2px 20px rgba(100, 150, 255, 0.4);
      margin-bottom: 40px;
    }

    .divider {
      width: 60px;
      height: 3px;
      background: linear-gradient(90deg, #667eea, #764ba2);
      border-radius: 2px;
      margin: 0 auto 40px;
    }

    /* QR section — only shown on desktop */
    .qr-section {
      display: none;
    }

    @media (min-width: 768px) {
      .qr-section {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
      }
      .qr-label {
        font-size: 13px;
        color: #888;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }
      #qrcode canvas, #qrcode img {
        border: 10px solid white;
        border-radius: 8px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      }
      button {
        margin-top: 10px;
        padding: 10px 24px;
        background: #667eea;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 14px;
      }
      button:hover { background: #764ba2; }
    }
  </style>
</head>
<body>

  <div class="message">Το QR δημιουργήθηκε τον Μάιο του 2026</div>
  <div class="divider"></div>

  <div class="qr-section">
    <div class="qr-label">Σαρώστε για να δείτε το μήνυμα</div>
    <div id="qrcode"></div>
    <button onclick="downloadQR()">Download QR as PNG</button>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script>
    const qr = new QRCode(document.getElementById("qrcode"), {
      text: "https://xtheodosis.github.io/qr-greek/",
      width: 260,
      height: 260,
      colorDark: "#000000",
      colorLight: "#ffffff",
      correctLevel: QRCode.CorrectLevel.H
    });

    function downloadQR() {
      const canvas = document.querySelector("#qrcode canvas");
      if (!canvas) { alert("QR not ready yet."); return; }
      const link = document.createElement("a");
      link.download = "qr-greek.png";
      link.href = canvas.toDataURL("image/png");
      link.click();
    }
  </script>
</body>
</html>
