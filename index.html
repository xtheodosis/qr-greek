<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <title>Greek QR Code</title>
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #f5f5f5;
    }
    h2 { color: #333; margin-bottom: 8px; }
    p { color: #666; margin-bottom: 24px; font-size: 14px; }
    #qrcode canvas, #qrcode img { border: 12px solid white; box-shadow: 0 2px 12px rgba(0,0,0,0.15); }
    .message { margin-top: 20px; font-size: 18px; color: #444; font-weight: bold; }
    .hint { font-size: 12px; color: #999; margin-top: 6px; }
    button {
      margin-top: 20px;
      padding: 10px 24px;
      background: #333;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover { background: #555; }
  </style>
</head>
<body>
  <h2>QR Code Generator</h2>
  <p>Scan to display the Greek message</p>
  <div id="qrcode"></div>
  <div class="message">Το QR δημιουργήθηκε τον Μάιο του 2026</div>
  <div class="hint">Scan to open the page with the Greek message</div>
  <button onclick="downloadQR()">Download QR as PNG</button>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script>
    const text = "https://harisf430.github.io/qr-greek/";
    const qr = new QRCode(document.getElementById("qrcode"), {
      text: text,
      width: 300,
      height: 300,
      colorDark: "#000000",
      colorLight: "#ffffff",
      correctLevel: QRCode.CorrectLevel.H
    });

    function downloadQR() {
      const canvas = document.querySelector("#qrcode canvas");
      if (!canvas) { alert("QR not ready yet, try again in a moment."); return; }
      const link = document.createElement("a");
      link.download = "qr-greek.png";
      link.href = canvas.toDataURL("image/png");
      link.click();
    }
  </script>
</body>
</html>
